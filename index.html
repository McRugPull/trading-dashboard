<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="Preston's Trading Dashboard — journal, analytics, and discipline tracking." />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <title>Preston's Trading Dashboard</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong
      // theme. Defaults to dark unless the user explicitly chose light.
      (function () {
        try {
          var t = localStorage.getItem('ptd.theme');
          if (t !== 'light') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
